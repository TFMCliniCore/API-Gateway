services:
  ms-entidades-db:
    image: postgres:16-alpine
    container_name: clinicore-api-gateway-db
    command: ["postgres", "-c", "trust_auth_method=trust"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: api_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - api_gateway_postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinicore-api-gateway
    restart: unless-stopped
    depends_on:
      ms-entidades-db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      CORS_ORIGIN: ${CORS_ORIGIN}
      MS_ENTIDADES_CORE_URL: ${MS_ENTIDADES_CORE_URL}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ms-entidades-db:5432/${POSTGRES_DB}?schema=public
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT}:${PORT}"

volumes:
  api_gateway_postgres_data:

