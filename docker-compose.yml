services:
  ms-entidades-db:
    image: postgres:16-alpine
    container_name: clinicore-api-gateway-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: api_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_gateway"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - api_gateway_postgres_data:/var/lib/postgresql/data

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinicore-api-gateway
    restart: unless-stopped
    depends_on:
      ms-entidades-db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: postgresql://postgres:postgres@ms-entidades-db:5432/api_gateway?schema=public
      VENTAS_MS_URL: http://clinicore-ms-ventas:3008/api/v1
      MS_INVENTARIO_URL: http://ms-inventario-api:3007/api/v1
      MS_ENTIDADES_CORE_URL: ${MS_ENTIDADES_CORE_URL}
      MS_INTEGRACIONES_URL: ${MS_INTEGRACIONES_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT}:${PORT}"
    networks:
      - default
      - red_inventario
      - red_ventas

volumes:
  api_gateway_postgres_data:

networks:
  default:
  red_inventario:
    external: true
    name: ms_inventario_ms-inventario-net
  red_ventas:
    external: true
    name: ms-ventas_default